<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#4a67ff" />
    <title>Focus Timer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Focus Timer</h1>
      <p class="description">iPhoneだけで使える1ページタイマー</p>

      <section class="timer-card" aria-live="polite">
        <p id="modeLabel" class="mode-label">作業</p>
        <p id="timeDisplay" class="time-display">25:00</p>
      </section>

      <div class="controls">
        <button id="startPauseBtn" type="button">開始</button>
        <button id="resetBtn" type="button" class="secondary">リセット</button>
        <button id="switchModeBtn" type="button" class="secondary">休憩に切替</button>
      </div>

      <p class="hint">Safariで開いてそのまま利用できます。</p>
    </main>

    <script src="./script.js"></script>
  </body>
</html>

<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <title>SF6 スクレイピングツール</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <h1>SF6 情報取得ツール（Vercel対応）</h1>
        <p>ボタン操作でプロフィール・ランキング・任意ページの情報を取得できます。</p>
      </header>

      <section class="card" aria-labelledby="profileTitle">
        <h2 id="profileTitle">1) プレイヤープロフィール取得</h2>
        <p class="hint">まずログインページを開いてCFNにログインしてから「取得」を押してください。</p>
        <button id="openLoginBtn" type="button">ログインページを開く</button>
        <button id="fetchProfileBtn" type="button">プロフィールを取得</button>
      </section>

      <section class="card" aria-labelledby="rankingTitle">
        <h2 id="rankingTitle">2) ランキングページ取得</h2>
        <p class="hint">ランキングページURLを指定して「取得」を押してください。</p>
        <label>
          ランキングURL
          <input id="rankingUrlInput" type="url" value="https://www.streetfighter.com/6/buckler/ja-jp/ranking" />
        </label>
        <button id="fetchRankingBtn" type="button">ランキングを取得</button>
      </section>

      <section class="card" aria-labelledby="customTitle">
        <h2 id="customTitle">3) 任意スクレイピング</h2>
        <div class="form-grid">
          <label>
            URL
            <input id="customUrlInput" type="url" placeholder="https://example.com" />
          </label>
          <label>
            CSSセレクタ（任意）
            <input id="selectorInput" type="text" placeholder="h1, .player-name" />
          </label>
          <label>
            最大抽出件数
            <input id="limitInput" type="number" min="1" max="30" value="10" />
          </label>
        </div>
        <button id="fetchCustomBtn" type="button">スクレイピング実行</button>
      </section>

      <section class="card" aria-labelledby="resultTitle">
        <h2 id="resultTitle">取得結果</h2>
        <p id="status" class="status" aria-live="polite">準備完了。</p>
        <pre id="resultView" class="result">ここに結果が表示されます。</pre>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
